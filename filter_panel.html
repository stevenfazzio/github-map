<style>

<script>
(function() {
  const FILTER_CONFIG = __FILTER_CONFIG_JSON__;

  class FilterPanel {
    constructor(datamap, hoverData, config) {
      this.datamap = datamap;
      this.hoverData = hoverData;
      this.config = config;
      this.filters = {};
      this.totalCount = config.totalCount;
      this.colormapFieldToFilterId = config.colormapFieldToFilterId || {};
      this.filterIdToColormapField = config.filterIdToColormapField || {};
      this.patchedLegends = {};

      this.container = document.getElementById('filter-controls');
      this.matchCountEl = document.getElementById('filter-match-count');

      this.initRangeFilter('stars', 'filter-stars', {
        label: 'Star Count',
        field: 'stars',
        min: config.ranges.stars.min,
        max: config.ranges.stars.max,
        sliderMax: config.ranges.stars.sliderMax,
        step: 1,
        capLabel: true,
      });

      this.initRangeFilter('created_year', 'filter-created-year', {
        label: 'Created Date',
        field: 'created_year',
        min: config.ranges.created_year.min,
        max: config.ranges.created_year.max,
        sliderMax: config.ranges.created_year.max,
        step: 1,
        integerLabels: true,
      });

      this.initRangeFilter('days_since_push', 'filter-days-since-push', {
        label: 'Last Push (days ago)',
        field: 'days_since_push',
        min: config.ranges.days_since_push.min,
        max: config.ranges.days_since_push.max,
        sliderMax: config.ranges.days_since_push.sliderMax,
        step: 1,
        capLabel: true,
      });

      this.initRangeFilter('forks', 'filter-forks', {
        label: 'Fork Count',
        field: 'forks',
        min: config.ranges.forks.min,
        max: config.ranges.forks.max,
        sliderMax: config.ranges.forks.sliderMax,
        step: 1,
        capLabel: true,
      });

      this.initRangeFilter('open_issues', 'filter-open-issues', {
        label: 'Open Issues',
        field: 'open_issues',
        min: config.ranges.open_issues.min,
        max: config.ranges.open_issues.max,
        sliderMax: config.ranges.open_issues.sliderMax,
        step: 1,
        capLabel: true,
      });

      this.initCheckboxFilter('language', 'filter-language', {
        label: 'Primary Language',
        field: 'primary_language',
        values: config.languages,
      });

      this.initCheckboxFilter('activity_status', 'filter-activity-status', {
        label: 'Activity Status',
        field: 'activity_status',
        values: config.activityStatuses,
      });

      this.setupLegendSync();

      // Toggle panel
      const header = document.getElementById('filter-header');
      const body = document.getElementById('filter-body');
      const icon = document.getElementById('filter-toggle-icon');
      header.addEventListener('click', () => {
        body.classList.toggle('open');
        document.getElementById('filter-container').classList.toggle('open');
        icon.innerHTML = body.classList.contains('open') ? '&#9662;' : '&#9656;';
        if (body.classList.contains('open')) {
          this.updateFilterBodyHeight();
        }
      });

      // Recalculate on resize
      window.addEventListener('resize', () => {
        if (body.classList.contains('open')) this.updateFilterBodyHeight();
      });

      // Reset button
      document.getElementById('filter-reset-inline').addEventListener('click', () => this.resetAll());

      this.updateMatchCount();
    }

    initRangeFilter(name, filterId, opts) {
      const { label, field, min, max, sliderMax, step, integerLabels, capLabel, decimals } = opts;
      const group = document.createElement('div');
      group.className = 'filter-group';
      const maxInitLabel = capLabel && sliderMax < max ? sliderMax + '+' : sliderMax;
      group.innerHTML = `
        <div class="filter-group-label">
          <span>${label}</span>
          <span class="filter-range-value" id="${filterId}-value">${min} – ${maxInitLabel}</span>
        </div>
        <div class="filter-range-wrapper">
          <div class="filter-range-track"></div>
          <div class="filter-range-fill" id="${filterId}-fill"></div>
          <input type="range" id="${filterId}-min" min="${min}" max="${sliderMax}" value="${min}" step="${step}">
          <input type="range" id="${filterId}-max" min="${min}" max="${sliderMax}" value="${sliderMax}" step="${step}">
        </div>
      `;
      this.container.appendChild(group);

      const minInput = document.getElementById(`${filterId}-min`);
      const maxInput = document.getElementById(`${filterId}-max`);
      const fill = document.getElementById(`${filterId}-fill`);
      const valueLabel = document.getElementById(`${filterId}-value`);

      // Pre-parse the numeric data from hoverData for this field
      const values = this.hoverData[field].map(Number);

      const state = { minVal: min, maxVal: sliderMax };
      this.filters[filterId] = { type: 'range', state, minInput, maxInput, min, sliderMax, max, field, values };

      const updateFill = () => {
        const range = sliderMax - min;
        const leftPct = range === 0 ? 0 : ((state.minVal - min) / range) * 100;
        const rightPct = range === 0 ? 100 : ((state.maxVal - min) / range) * 100;
        fill.style.left = leftPct + '%';
        fill.style.width = (rightPct - leftPct) + '%';
      };

      const onInput = () => {
        let lo = decimals != null ? parseFloat(minInput.value) : parseInt(minInput.value);
        let hi = decimals != null ? parseFloat(maxInput.value) : parseInt(maxInput.value);
        if (lo > hi) { [lo, hi] = [hi, lo]; }
        state.minVal = lo;
        state.maxVal = hi;

        const fmt = decimals != null ? (v) => v.toFixed(decimals) : (v) => String(v);
        const hiText = (hi >= sliderMax && capLabel && sliderMax < max) ? fmt(hi) + '+' : fmt(hi);
        valueLabel.textContent = `${fmt(lo)} – ${hiText}`;

        updateFill();
        this.applyRangeFilter(filterId);
      };

      minInput.addEventListener('input', onInput);
      maxInput.addEventListener('input', onInput);
      updateFill();
    }

    applyRangeFilter(filterId) {
      const f = this.filters[filterId];
      const { state, min, sliderMax, max, values } = f;
      const isFullRange = state.minVal <= min && state.maxVal >= sliderMax;

      if (isFullRange) {
        this.datamap.removeSelection(filterId);
      } else {
        // When max handle is at slider cap, include all values above
        const effectiveMax = state.maxVal >= sliderMax ? max : state.maxVal;
        const indices = [];
        for (let i = 0; i < values.length; i++) {
          if (values[i] >= state.minVal && values[i] <= effectiveMax) {
            indices.push(i);
          }
        }
        this.datamap.addSelection(indices, filterId);
      }
      this.updateMatchCount();
    }

    initCheckboxFilter(name, filterId, opts) {
      const { label, field, values } = opts;
      const group = document.createElement('div');
      group.className = 'filter-group';

      const allId = `${filterId}-select-all`;
      const noneId = `${filterId}-select-none`;
      let html = `<div class="filter-group-label"><span>${label}</span><span class="filter-group-actions"><a id="${allId}">All</a> / <a id="${noneId}">None</a></span></div><div class="filter-checkbox-list">`;
      for (const val of values) {
        const id = `${filterId}-${val.replace(/\s+/g, '-')}`;
        html += `<label class="filter-checkbox-item"><input type="checkbox" id="${id}" value="${val}" checked> ${val}</label>`;
      }
      html += '</div>';
      group.innerHTML = html;
      this.container.appendChild(group);

      const checkboxes = group.querySelectorAll('input[type="checkbox"]');
      const fieldValues = this.hoverData[field];

      this.filters[filterId] = { type: 'checkbox', checkboxes, fieldValues, values };

      const onChange = () => {
        const checked = new Set();
        checkboxes.forEach(cb => { if (cb.checked) checked.add(cb.value); });
        const allChecked = checked.size === values.length;

        if (allChecked) {
          this.datamap.removeSelection(filterId);
        } else {
          const indices = [];
          for (let i = 0; i < fieldValues.length; i++) {
            if (checked.has(fieldValues[i])) {
              indices.push(i);
            }
          }
          this.datamap.addSelection(indices, filterId);
        }
        this.syncLegendOpacity(filterId);
        this.updateMatchCount();
      };

      checkboxes.forEach(cb => cb.addEventListener('change', onChange));

      document.getElementById(allId).addEventListener('click', () => {
        checkboxes.forEach(cb => { cb.checked = true; });
        onChange();
      });
      document.getElementById(noneId).addEventListener('click', () => {
        checkboxes.forEach(cb => { cb.checked = false; });
        onChange();
      });
    }

    setupLegendSync() {
      const colorSelector = this.datamap.colorSelector;
      if (!colorSelector || !colorSelector.legends) return;

      for (const [field, filterId] of Object.entries(this.colormapFieldToFilterId)) {
        this.patchLegendContainer(field, filterId, colorSelector);
      }

      // Monkey-patch handleColorMapSelection to sync legend on colormap switch
      const origHandler = colorSelector.handleColorMapSelection.bind(colorSelector);
      const self = this;
      colorSelector.handleColorMapSelection = function(field) {
        origHandler(field);
        self.onColormapChanged(field);
      };
    }

    patchLegendContainer(field, filterId, colorSelector) {
      const origContainer = colorSelector.legends[field];
      if (!origContainer) return;

      const newContainer = origContainer.cloneNode(true);
      origContainer.parentNode.replaceChild(newContainer, origContainer);
      colorSelector.legends[field] = newContainer;

      const items = newContainer.querySelectorAll('.legend-item');
      this.patchedLegends[field] = { container: newContainer, items };

      const self = this;
      newContainer.addEventListener('click', function(e) {
        const legendItem = e.target.closest('.legend-item');
        if (!legendItem) return;
        const labelEl = legendItem.querySelector('.legend-label');
        if (!labelEl) return;
        const category = labelEl.textContent.trim();

        const filter = self.filters[filterId];
        if (!filter || filter.type !== 'checkbox') return;

        let matchingCb = null;
        filter.checkboxes.forEach(cb => {
          if (cb.value === category) matchingCb = cb;
        });
        if (!matchingCb) return;

        // Replicate original legend behavior:
        // If all are checked, "solo" the clicked item (uncheck all others).
        // If some are already filtered, toggle the clicked item.
        const allChecked = Array.from(filter.checkboxes).every(cb => cb.checked);
        if (allChecked) {
          filter.checkboxes.forEach(cb => { cb.checked = (cb.value === category); });
        } else {
          // If this is the only checked item and we're about to uncheck it, restore all
          const checkedCbs = Array.from(filter.checkboxes).filter(cb => cb.checked);
          if (checkedCbs.length === 1 && checkedCbs[0].value === category) {
            filter.checkboxes.forEach(cb => { cb.checked = true; });
          } else {
            matchingCb.checked = !matchingCb.checked;
          }
        }
        // Fire change on one checkbox to trigger the shared onChange handler
        matchingCb.dispatchEvent(new Event('change'));
      });

      // Initial sync
      this.syncLegendOpacity(filterId);
    }

    syncLegendOpacity(filterId) {
      const field = this.filterIdToColormapField[filterId];
      if (!field || !this.patchedLegends[field]) return;

      const filter = this.filters[filterId];
      if (!filter || filter.type !== 'checkbox') return;

      const checked = new Set();
      filter.checkboxes.forEach(cb => { if (cb.checked) checked.add(cb.value); });
      const allChecked = checked.size === filter.values.length;

      this.patchedLegends[field].items.forEach(item => {
        const labelEl = item.querySelector('.legend-label');
        if (!labelEl) return;
        const label = labelEl.textContent.trim();
        item.style.opacity = (allChecked || checked.has(label)) ? 1 : 0.25;
      });
    }

    onColormapChanged(field) {
      const filterId = this.colormapFieldToFilterId[field];
      if (filterId) this.syncLegendOpacity(filterId);
    }

    updateFilterBodyHeight() {
      const body = document.getElementById('filter-body');
      const colormap = document.getElementById('colormap-selector-container');
      if (!colormap) return;
      const bodyTop = body.getBoundingClientRect().top;
      const colormapTop = colormap.getBoundingClientRect().top;
      const available = colormapTop - bodyTop - 20; // 20px buffer
      if (available > 0) body.style.maxHeight = available + 'px';
    }

    updateMatchCount() {
      const mgr = this.datamap.dataSelectionManager;
      const hasSelections = Object.keys(mgr.selectedIndicesByItem).length > 0;
      if (hasSelections) {
        const selected = mgr.getSelectedIndices();
        this.matchCountEl.textContent = `${selected.size.toLocaleString()} of ${this.totalCount.toLocaleString()} repos`;
      } else {
        this.matchCountEl.textContent = `${this.totalCount.toLocaleString()} of ${this.totalCount.toLocaleString()} repos`;
      }
    }

    resetAll() {
      for (const [filterId, f] of Object.entries(this.filters)) {
        if (f.type === 'range') {
          f.minInput.value = f.min;
          f.maxInput.value = f.sliderMax;
          f.state.minVal = f.min;
          f.state.maxVal = f.sliderMax;
          // Trigger visual update
          f.minInput.dispatchEvent(new Event('input'));
        } else if (f.type === 'checkbox') {
          f.checkboxes.forEach(cb => { cb.checked = true; });
        }
        this.datamap.removeSelection(filterId);
      }
      // Reset legend opacities
      for (const legend of Object.values(this.patchedLegends)) {
        legend.items.forEach(item => { item.style.opacity = 1; });
      }

      this.updateMatchCount();

      // Reset display toggles to defaults
      const labelToggle = document.getElementById('label-toggle');
      const boundaryToggle = document.getElementById('boundary-toggle');
      const edgeGraphToggle = document.getElementById('edge-graph-toggle');
      if (labelToggle.checked !== true) {
        labelToggle.checked = true;
        labelToggle.dispatchEvent(new Event('change'));
      }
      if (boundaryToggle.checked !== false) {
        boundaryToggle.checked = false;
        boundaryToggle.dispatchEvent(new Event('change'));
      }
      if (edgeGraphToggle.checked !== false) {
        edgeGraphToggle.checked = false;
        edgeGraphToggle.dispatchEvent(new Event('change'));
      }
    }
  }

  // Monkey-patch highlightPoints to preserve original point radius settings.
  function patchHighlightPoints(datamap) {
    var origHighlight = datamap.highlightPoints.bind(datamap);
    datamap.highlightPoints = function(itemId) {
      var currentLayer = datamap.pointLayer;
      var realClone = currentLayer.clone.bind(currentLayer);
      currentLayer.clone = function(overrides) {
        overrides.radiusMinPixels = datamap.pointRadiusMinPixels;
        overrides.radiusMaxPixels = datamap.pointRadiusMaxPixels;
        return realClone(overrides);
      };
      origHighlight(itemId);
      currentLayer.clone = realClone;
      if (datamap._pointLabels) {
        var mgr = datamap.dataSelectionManager;
        var hasSelections = Object.keys(mgr.selectedIndicesByItem).length > 0;
        datamap._pointLabels.updateVisibility(
          hasSelections ? mgr.getSelectedIndices() : null
        );
      }
    };
  }

  // Toggle cluster label visibility.
  function setupLabelToggle(datamap) {
    const toggle = document.getElementById('label-toggle');
    let labelData = null;

    function setLabelVisible(visible) {
      if (!datamap.labelLayer) return;
      if (!labelData) labelData = datamap.labelLayer.props.data;
      const idx = datamap.layers.indexOf(datamap.labelLayer);
      if (idx === -1) return;
      const replacement = new deck.TextLayer({
        id: 'labelLayer',
        data: labelData,
        pickable: datamap.labelLayer.props.pickable,
        getPosition: d => [d.x, d.y],
        getText: d => d.label,
        getColor: datamap.labelTextColor,
        getSize: d => d.size,
        sizeScale: 1,
        sizeMinPixels: datamap.textMinPixelSize,
        sizeMaxPixels: datamap.textMaxPixelSize,
        outlineWidth: datamap.textOutlineWidth,
        outlineColor: datamap.textOutlineColor,
        getBackgroundColor: datamap.textBackgroundColor,
        getBackgroundPadding: [15, 15, 15, 15],
        background: true,
        characterSet: 'auto',
        fontFamily: datamap.fontFamily,
        fontWeight: datamap.fontWeight,
        lineHeight: 0.95,
        fontSettings: { sdf: true },
        getTextAnchor: 'middle',
        getAlignmentBaseline: 'center',
        elevation: 100,
        collisionEnabled: true,
        getCollisionPriority: d => d.size,
        collisionTestProps: {
          sizeScale: datamap.textCollisionSizeScale,
          sizeMaxPixels: datamap.textMaxPixelSize * 2,
          sizeMinPixels: datamap.textMinPixelSize * 2,
        },
        extensions: [new deck.CollisionFilterExtension()],
        parameters: { depthTest: false },
        visible,
      });
      datamap.layers[idx] = replacement;
      datamap.labelLayer = replacement;
      datamap.deckgl.setProps({ layers: [...datamap.layers] });
    }

    toggle.addEventListener('change', () => {
      setLabelVisible(toggle.checked);
      if (datamap._pointLabels) datamap._pointLabels.setEnabled(toggle.checked);
    });
  }

  // Hide cluster boundary polygons by default; let the user toggle them on.
  function setupBoundaryToggle(datamap) {
    const toggle = document.getElementById('boundary-toggle');

    let boundaryData = null;

    function setBoundaryVisible(visible) {
      if (!datamap.boundaryLayer) return;
      if (!boundaryData) boundaryData = datamap.boundaryLayer.props.data;
      const idx = datamap.layers.indexOf(datamap.boundaryLayer);
      if (idx === -1) return;
      const replacement = new deck.PolygonLayer({
        id: 'boundaryLayer',
        data: boundaryData,
        stroked: true,
        filled: false,
        getLineColor: d => [d.r, d.g, d.b, d.a],
        getPolygon: d => d.polygon,
        lineWidthUnits: 'common',
        getLineWidth: d => d.size * d.size,
        lineWidthScale: datamap.clusterBoundaryLineWidth * 5e-5,
        lineJointRounded: true,
        lineWidthMaxPixels: 4,
        lineWidthMinPixels: 0.0,
        parameters: { depthTest: false },
        visible,
      });
      datamap.layers[idx] = replacement;
      datamap.boundaryLayer = replacement;
      datamap.deckgl.setProps({ layers: [...datamap.layers] });
    }

    toggle.addEventListener('change', () => {
      setBoundaryVisible(toggle.checked);
    });
  }

  // Toggle edge graph (background image layer) visibility.
  function setupEdgeGraphToggle(datamap) {
    const toggle = document.getElementById('edge-graph-toggle');

    function setEdgeGraphVisible(visible) {
      if (!datamap.imageLayer) return;
      const idx = datamap.layers.indexOf(datamap.imageLayer);
      if (idx === -1) return;
      const replacement = new deck.BitmapLayer({
        id: 'imageLayer',
        bounds: datamap.imageLayer.props.bounds,
        image: datamap.imageLayer.props.image,
        parameters: { depthTest: false },
        visible,
      });
      datamap.layers[idx] = replacement;
      datamap.imageLayer = replacement;
      datamap.deckgl.setProps({ layers: [...datamap.layers] });
    }

    toggle.addEventListener('change', () => {
      setEdgeGraphVisible(toggle.checked);
    });
  }

  // Wait for DataMapPlot to finish loading data
  window.addEventListener('datamapReady', function(e) {
    const { datamap, hoverData } = e.detail;
    patchHighlightPoints(datamap);
    setupLabelToggle(datamap);
    setupBoundaryToggle(datamap);
    setupEdgeGraphToggle(datamap);
    new FilterPanel(datamap, hoverData, FILTER_CONFIG);
  });
})();
</script>
