name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v2
        with:
          args: check

      - uses: astral-sh/ruff-action@v2
        with:
          args: format --check
